name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_NAME: RDPWrap Monitor

jobs:
  build:
    name: Build and Package
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Get version
      id: get_version
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $version = "${{ github.event.inputs.version }}"
        } else {
          $version = "${{ github.ref_name }}".TrimStart('v')
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "Build version: $version"

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Service (win-x64)
      run: |
        dotnet publish src/RdpWrapMonitor.Service/RdpWrapMonitor.Service.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          /p:PublishSingleFile=true `
          /p:IncludeNativeLibrariesForSelfExtract=true `
          /p:PublishDir=../../publish/service/win-x64 `
          /p:Version=${{ steps.get_version.outputs.version }}

    - name: Publish Setup (win-x64)
      run: |
        dotnet publish src/RdpWrapMonitor.Setup/RdpWrapMonitor.Setup.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          /p:PublishSingleFile=true `
          /p:IncludeNativeLibrariesForSelfExtract=true `
          /p:PublishDir=../../publish/setup/win-x64 `
          /p:Version=${{ steps.get_version.outputs.version }}

    - name: Create ZIP package
      run: |
        Compress-Archive -Path publish/* -DestinationPath RDPWrapMonitor-${{ steps.get_version.outputs.version }}.zip -Force
        Compress-Archive -Path publish/service/win-x64/* -DestinationPath RDPWrapMonitor.Service-${{ steps.get_version.outputs.version }}.zip -Force
        Compress-Archive -Path publish/setup/win-x64/* -DestinationPath RDPWrapMonitor.Setup-${{ steps.get_version.outputs.version }}.zip -Force

    - name: Create installer with Inno Setup
      run: |
        # Download and install Inno Setup
        Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile is.exe
        Start-Process is.exe -Wait -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-", "/DIR=C:\Program Files (x86)\Inno Setup 6"

        # Compile the installer
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\rdpwrap-monitor.iss

        # Move output
        if (Test-Path installer\Output\*.exe) {
          Copy-Item installer\Output\*.exe -Destination RDPWrapMonitor-Setup-${{ steps.get_version.outputs.version }}.exe
        }

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-files
        path: |
          *.zip
          *.exe
        retention-days: 5

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          *.zip
          RDPWrapMonitor-Setup-*.exe
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-arm64:
    name: Build ARM64
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Get version
      id: get_version
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $version = "${{ github.event.inputs.version }}"
        } else {
          $version = "${{ github.ref_name }}".TrimStart('v')
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Service (win-arm64)
      run: |
        dotnet publish src/RdpWrapMonitor.Service/RdpWrapMonitor.Service.csproj `
          -c Release `
          -r win-arm64 `
          --self-contained true `
          /p:PublishSingleFile=true `
          /p:IncludeNativeLibrariesForSelfExtract=true `
          /p:PublishDir=../../publish/service/win-arm64 `
          /p:Version=${{ steps.get_version.outputs.version }}

    - name: Publish Setup (win-arm64)
      run: |
        dotnet publish src/RdpWrapMonitor.Setup/RdpWrapMonitor.Setup.csproj `
          -c Release `
          -r win-arm64 `
          --self-contained true `
          /p:PublishSingleFile=true `
          /p:IncludeNativeLibrariesForSelfExtract=true `
          /p:PublishDir=../../publish/setup/win-arm64 `
          /p:Version=${{ steps.get_version.outputs.version }}

    - name: Create ZIP package (ARM64)
      run: |
        Compress-Archive -Path publish/* -DestinationPath RDPWrapMonitor-${{ steps.get_version.outputs.version }}-arm64.zip -Force

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-files-arm64
        path: |
          *-arm64.zip
        retention-days: 5

    - name: Add to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: '*-arm64.zip'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
